<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PinkMeUP</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>PinkMeUP</h1>
        <p>Beauty Spa &amp; Academy</p>
      </div>

      <div class="auth-title">
        <h2>Welcome Back</h2>
        <p>Sign in to manage your bookings</p>
      </div>

      <form id="login-form" class="auth-form">
        <div id="form-error" class="error-message"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required>
          <div class="error-message" id="password-error"></div>
        </div>

        <div style="text-align: right; margin-bottom: 16px;">
          <a href="reset.html" style="color: #ff6b9d; font-size: 14px; text-decoration: none;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create Account</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
