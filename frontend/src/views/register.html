<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PinkMeUP</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>PinkMeUP</h1>
        <p>Beauty Spa &amp; Academy</p>
      </div>

      <div class="auth-title">
        <h2>Create Account</h2>
        <p>Join us to book your beauty services</p>
      </div>

      <form id="register-form" class="auth-form">
        <div id="form-error" class="error-message"></div>

        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" placeholder="Enter your first name" required>
          <div class="error-message" id="firstName-error"></div>
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" placeholder="Enter your last name" required>
          <div class="error-message" id="lastName-error"></div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
          <div class="error-message" id="email-error"></div>
        </div>

        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="+27 82 123 4567" required>
          <div class="error-message" id="phone-error"></div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Minimum 6 characters" required>
          <div class="error-message" id="password-error"></div>
        </div>

        <button type="submit" class="btn-primary" id="register-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/register.js"></script>
</body>
</html>
