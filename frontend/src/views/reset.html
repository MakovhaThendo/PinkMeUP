<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - PinkMeUP</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>PinkMeUP</h1>
        <p>Beauty Spa &amp; Academy</p>
      </div>

      <div class="auth-title">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a reset link</p>
      </div>

      <form id="reset-form" class="auth-form">
        <div id="form-error" class="error-message"></div>
        <div id="form-success" class="success-message"></div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" required>
          <div class="error-message" id="email-error"></div>
        </div>

        <button type="submit" class="btn-primary" id="reset-btn">Send Reset Link</button>
      </form>

      <div class="auth-footer">
        Remember your password? <a href="login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/reset.js"></script>
</body>
</html>
